<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page_title }}</title>
<meta name="description" content="{{ page_desc }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ root }}static/css/style.css">
<link rel="icon" href="data:,">
</head>
<body>
<header class="site">
  <div class="wrap">
    <a class="site-name" href="{{ root }}index.html">{{ site_name }}<span class="dot">.</span></a>
    <nav class="site-nav">
      <a href="{{ root }}index.html" class="{{ 'active' if active=='home' else '' }}">home</a>
      <a href="{{ root }}posts.html" class="{{ 'active' if active=='posts' else '' }}">writing</a>
      <a href="{{ root }}projects.html" class="{{ 'active' if active=='projects' else '' }}">projects</a>
      <a href="{{ root }}papers.html" class="{{ 'active' if active=='papers' else '' }}">papers</a>
      <a href="{{ root }}about.html" class="{{ 'active' if active=='about' else '' }}">about</a>
    </nav>
  </div>
</header>

<main>
{{ content }}
</main>

<footer class="site">
  <div>&copy; {{ year }} {{ author_name }} &mdash; built with markdown, not a framework</div>
  <div>
    <a href="https://github.com/{{ github_user }}">github</a>
  </div>
</footer>
</body>
</html>
